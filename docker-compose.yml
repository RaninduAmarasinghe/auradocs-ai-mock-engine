services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  auradocs-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # We use 'host.docker.internal' to talk to Ollama running on your Mac
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/auradocs
      - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - mongodb

volumes:
  mongo-data: